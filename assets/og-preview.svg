<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff1d6"/>
      <stop offset="0.48" stop-color="#dff8ee"/>
      <stop offset="1" stop-color="#ffe4ec"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#253150"/>
      <stop offset="1" stop-color="#151d31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#172033" flood-opacity="0.22"/>
    </filter>
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="5" flood-color="#172033" flood-opacity="0.22"/>
    </filter>
    <pattern id="stripe" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(90)">
      <rect width="18" height="36" fill="#ff5f58" opacity="0.055"/>
    </pattern>
    <style>
      .font { font-family: "Arial Rounded MT Bold", "Avenir Next", system-ui, sans-serif; }
      .small { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
      .title { font-size: 90px; font-weight: 900; letter-spacing: 0; }
      .copy { font-size: 34px; font-weight: 700; }
      .pill { font-size: 30px; font-weight: 800; }
      .stat { font-size: 25px; font-weight: 800; }
      .badge { font-size: 29px; font-weight: 900; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="196" cy="104" r="230" fill="#ffc247" opacity="0.34"/>
  <circle cx="1080" cy="70" r="250" fill="#5577ff" opacity="0.2"/>
  <rect x="40" y="40" width="1120" height="550" rx="42" fill="#ffffff" opacity="0.72" filter="url(#shadow)"/>
  <rect x="40" y="40" width="1120" height="550" rx="42" fill="url(#stripe)" opacity="0.9"/>
  <rect x="40" y="40" width="1120" height="550" rx="42" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9"/>

  <text class="font small" x="92" y="96" fill="#ff5f58">DAILY SNACK CLASH</text>
  <text class="font title" x="90" y="188" fill="#172033">Snack Stack</text>
  <text class="font copy" x="94" y="258" fill="#596174">Clear the pile, score for your country,</text>
  <text class="font copy" x="94" y="302" fill="#596174">and challenge friends to beat today's stack.</text>

  <g>
    <rect x="92" y="354" width="134" height="64" rx="32" fill="#ffffff" opacity="0.88" stroke="#dfe7e3" stroke-width="2"/>
    <text class="font pill" x="116" y="397" fill="#172033">🇺🇸 USA</text>
    <rect x="244" y="354" width="158" height="64" rx="32" fill="#ffffff" opacity="0.88" stroke="#dfe7e3" stroke-width="2"/>
    <text class="font pill" x="268" y="397" fill="#172033">🇯🇵 Japan</text>
    <rect x="420" y="354" width="158" height="64" rx="32" fill="#ffffff" opacity="0.88" stroke="#dfe7e3" stroke-width="2"/>
    <text class="font pill" x="444" y="397" fill="#172033">🇧🇷 Brazil</text>
  </g>

  <g transform="translate(704 92)">
    <rect width="376" height="446" rx="34" fill="#ffffff" opacity="0.78" stroke="#ffffff" stroke-width="4" filter="url(#shadow)"/>
    <g transform="translate(24 24)">
      <rect width="96" height="58" rx="17" fill="#eef9f4"/>
      <rect x="116" width="96" height="58" rx="17" fill="#eef9f4"/>
      <rect x="232" width="96" height="58" rx="17" fill="#eef9f4"/>
      <text class="font stat" x="18" y="37" fill="#172033">30 left</text>
      <text class="font stat" x="129" y="37" fill="#172033">0 match</text>
      <text class="font stat" x="251" y="37" fill="#172033">00:21</text>
    </g>
    <g transform="translate(24 104)">
      <rect width="328" height="284" rx="28" fill="#fffaf0" stroke="#ffffff" stroke-width="3"/>
      <path d="M0 0H328V284H0z" fill="#ffc247" opacity="0.08"/>
      <g filter="url(#tileShadow)">
        <rect x="38" y="38" width="78" height="78" rx="20" fill="#f6c558" stroke="#ffffff" stroke-width="5"/>
        <text x="56" y="91" font-size="42">🍕</text>
        <rect x="124" y="38" width="78" height="78" rx="20" fill="#f09654" stroke="#ffffff" stroke-width="5"/>
        <text x="142" y="91" font-size="42">🍔</text>
        <rect x="210" y="38" width="78" height="78" rx="20" fill="#f5d05f" stroke="#ffffff" stroke-width="5"/>
        <text x="228" y="91" font-size="42">🍟</text>
        <rect x="82" y="116" width="78" height="78" rx="20" fill="#86c97d" stroke="#ffffff" stroke-width="5"/>
        <text x="100" y="169" font-size="42">🌮</text>
        <rect x="168" y="116" width="78" height="78" rx="20" fill="#e87575" stroke="#ffffff" stroke-width="5"/>
        <text x="186" y="169" font-size="42">🥤</text>
        <rect x="126" y="194" width="78" height="78" rx="20" fill="#f2d06f" stroke="#ffffff" stroke-width="5"/>
        <text x="144" y="247" font-size="42">🍿</text>
      </g>
    </g>
  </g>

  <g>
    <rect x="862" y="508" width="252" height="64" rx="32" fill="url(#dark)"/>
    <text class="font badge" x="893" y="550" fill="#ffffff">Can you clear it?</text>
  </g>
</svg>
