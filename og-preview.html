<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=1.0" />
    <title>Rescue Rush OG Preview</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4676489831244915"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
        color: #172033;
        font-family: "Fredoka", system-ui, sans-serif;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 194, 71, 0.48), transparent 260px),
          radial-gradient(circle at 90% 10%, rgba(85, 119, 255, 0.34), transparent 280px),
          linear-gradient(135deg, #fff1d6 0%, #dff8ee 48%, #ffe4ec 100%);
      }

      .card {
        width: 1120px;
        height: 550px;
        margin: 40px;
        border: 3px solid rgba(255, 255, 255, 0.86);
        border-radius: 42px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.58)),
          repeating-linear-gradient(90deg, rgba(255, 95, 88, 0.06) 0 18px, transparent 18px 36px);
        box-shadow: 0 28px 80px rgba(23, 32, 51, 0.2);
        display: grid;
        grid-template-columns: 1fr 430px;
        gap: 28px;
        padding: 52px;
        position: relative;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #ff5f58;
        font-size: 28px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        max-width: 650px;
        margin: 0;
        font-size: 88px;
        line-height: 0.95;
        letter-spacing: 0;
        text-shadow: 0 8px 0 rgba(255, 194, 71, 0.42);
      }

      .sub {
        max-width: 620px;
        margin: 28px 0 34px;
        color: #596174;
        font-size: 34px;
        line-height: 1.15;
        font-weight: 600;
      }

      .countries {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .pill {
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.84);
        border: 2px solid rgba(23, 32, 51, 0.08);
        box-shadow: inset 0 -6px 0 rgba(23, 32, 51, 0.06);
        padding: 14px 20px;
        font-size: 30px;
        font-weight: 700;
      }

      .phone {
        height: 446px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.78);
        border: 3px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 22px 60px rgba(23, 32, 51, 0.18);
        padding: 24px;
        display: grid;
        gap: 18px;
      }

      .bar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .stat {
        border-radius: 18px;
        background: linear-gradient(180deg, #ffffff, #eaf8f1);
        padding: 12px;
        text-align: center;
        font-size: 26px;
        font-weight: 700;
      }

      .board {
        position: relative;
        flex: 1;
        min-height: 270px;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 250, 239, 0.82)),
          repeating-linear-gradient(45deg, rgba(255, 194, 71, 0.2) 0 18px, rgba(78, 196, 160, 0.15) 18px 36px);
        overflow: hidden;
      }

      .tile {
        position: absolute;
        width: 78px;
        height: 78px;
        border-radius: 20px;
        border: 4px solid rgba(255, 255, 255, 0.96);
        display: grid;
        place-items: center;
        font-size: 42px;
        box-shadow: 0 10px 0 rgba(23, 32, 51, 0.2), 0 18px 28px rgba(23, 32, 51, 0.18);
      }

      .tile:nth-child(1) { left: 40px; top: 34px; background: #f6c558; }
      .tile:nth-child(2) { left: 126px; top: 34px; background: #f09654; }
      .tile:nth-child(3) { left: 212px; top: 34px; background: #f5d05f; }
      .tile:nth-child(4) { left: 84px; top: 112px; background: #86c97d; }
      .tile:nth-child(5) { left: 170px; top: 112px; background: #e87575; }
      .tile:nth-child(6) { left: 256px; top: 112px; background: #ca8b51; }
      .tile:nth-child(7) { left: 128px; top: 190px; background: #ffb3a6; }
      .tile:nth-child(8) { left: 214px; top: 190px; background: #f2d06f; }

      .badge {
        position: absolute;
        right: 48px;
        bottom: 42px;
        border-radius: 999px;
        background: linear-gradient(180deg, #253150, #151d31);
        color: white;
        box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.18);
        padding: 18px 26px;
        font-size: 28px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <section>
        <p class="eyebrow">Daily Rescue Clash</p>
        <h1>Rescue Rush</h1>
        <p class="sub">Save the pets, score rescues for your country, and challenge friends to beat today's mission.</p>
        <div class="countries">
          <span class="pill">🇺🇸 USA</span>
          <span class="pill">🇯🇵 Japan</span>
          <span class="pill">🇧🇷 Brazil</span>
        </div>
      </section>
      <section class="phone">
        <div class="bar">
          <div class="stat">30 left</div>
          <div class="stat">0 rescue</div>
          <div class="stat">00:21</div>
        </div>
        <div class="board">
          <div class="tile">🐶</div>
          <div class="tile">🐱</div>
          <div class="tile">🐰</div>
          <div class="tile">🐧</div>
          <div class="tile">🐻</div>
          <div class="tile">🦊</div>
          <div class="tile">🐼</div>
          <div class="tile">🚑</div>
        </div>
      </section>
      <div class="badge">Can you save them?</div>
    </div>
  </body>
</html>
